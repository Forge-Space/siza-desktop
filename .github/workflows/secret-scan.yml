name: Secret Scanning

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '0 4 * * *'

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@d17df4845197a68cbc37d33ad0e7f325b45c0033
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --only-verified --results=verified
