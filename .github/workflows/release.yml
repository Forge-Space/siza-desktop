name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
            target: dmg
            artifact: '*.dmg'
          - os: windows-latest
            platform: win
            target: nsis
            artifact: '*.exe'
          - os: ubuntu-latest
            platform: linux
            target: AppImage
            artifact: '*.AppImage'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run quality gates
        run: |
          npm run lint
          npm run type-check
          npm run test

      - name: Build Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run electron:build -- --${{ matrix.platform }} ${{ matrix.target }}

      - name: Validate packaged artifacts exist
        shell: bash
        run: |
          set -euo pipefail
          if ! compgen -G "dist-electron/${{ matrix.artifact }}" > /dev/null; then
            echo "Expected artifact pattern not found: dist-electron/${{ matrix.artifact }}"
            echo "Current dist-electron contents:"
            ls -la dist-electron || true
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: siza-desktop-${{ matrix.target }}
          path: dist-electron/${{ matrix.artifact }}
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
